<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natac: War — Combat &amp; Supply</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #3a3f58 0%, #23283b 100%);
      min-height: 100vh; padding: 16px; color: #1a1a1a;
    }
    .container { max-width: 1500px; margin: 0 auto; background: #fff; border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden; }
    .header { background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%); color: #fff;
      padding: 22px 30px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.9rem; letter-spacing: 0.5px; }
    .header p { opacity: 0.8; font-size: 0.95rem; margin-top: 4px; }
    .header a { color: #cbd5e0; font-size: 0.85rem; text-decoration: none; border: 1px solid #718096;
      padding: 6px 12px; border-radius: 6px; }
    .header a:hover { background: rgba(255,255,255,0.1); }

    /* Setup */
    .setup { padding: 34px 40px; }
    .setup h2 { color: #2d3748; margin: 22px 0 12px; font-size: 1.2rem; }
    .era-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    .era-card { border: 2px solid #e2e8f0; border-radius: 12px; padding: 18px; cursor: pointer; transition: all .2s; }
    .era-card:hover { border-color: #4a5568; transform: translateY(-2px); }
    .era-card.selected { border-color: #2b6cb0; background: #ebf4ff; }
    .era-card h3 { color: #2b6cb0; margin-bottom: 8px; }
    .era-card .needs { margin-top: 10px; font-size: 0.82rem; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.72rem;
      font-weight: 700; margin-right: 5px; color: #fff; }
    .badge.food { background: #38a169; } .badge.ammo { background: #c53030; } .badge.fuel { background: #d69e2e; }
    .era-card p { color: #4a5568; font-size: 0.9rem; line-height: 1.45; }
    .setup-row { display: flex; gap: 26px; flex-wrap: wrap; margin-top: 8px; }
    .setup-field { display: flex; flex-direction: column; gap: 6px; }
    .setup-field label { font-weight: 600; color: #4a5568; font-size: 0.9rem; }
    .setup-field input { padding: 9px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; width: 180px; }
    .btn { background: linear-gradient(135deg, #2b6cb0 0%, #2c5282 100%); color: #fff; border: none;
      padding: 14px 40px; font-size: 1.05rem; border-radius: 8px; cursor: pointer; margin-top: 26px; font-weight: 600; }
    .btn:hover { filter: brightness(1.08); }
    .btn:disabled { background: #a0aec0; cursor: not-allowed; }

    /* Game */
    .game { display: none; padding: 16px; }
    .game-layout { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
    .sidebar { background: #f7fafc; border-radius: 12px; padding: 16px; height: fit-content; max-height: 88vh; overflow-y: auto; }
    .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .panel h3 { font-size: 0.95rem; color: #2d3748; margin-bottom: 8px; }
    .res-hud { display: flex; gap: 8px; flex-wrap: wrap; }
    .res-chip { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 8px;
      background: #edf2f7; font-weight: 700; font-size: 0.9rem; }
    .res-chip .dot { width: 12px; height: 12px; border-radius: 3px; }
    .turn-line { font-size: 0.95rem; }
    .turn-line b { font-size: 1.05rem; }
    .unit-stats { font-size: 0.85rem; line-height: 1.7; }
    .unit-stats .k { color: #718096; display: inline-block; width: 92px; }
    .supply-ok { color: #38a169; font-weight: 700; }
    .supply-bad { color: #c53030; font-weight: 700; }
    .recruit-list { display: flex; flex-direction: column; gap: 6px; }
    .recruit-item { display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 7px 9px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .recruit-item:hover { background: #ebf4ff; border-color: #2b6cb0; }
    .recruit-item.disabled { opacity: 0.45; cursor: not-allowed; }
    .recruit-item.active { background: #2b6cb0; color: #fff; }
    .recruit-item .cost { font-weight: 700; white-space: nowrap; }
    .ctrl-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .ctrl-row button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.9rem; font-weight: 600; color: #fff; background: #2b6cb0; min-width: 90px; }
    .ctrl-row button.secondary { background: #718096; }
    .ctrl-row button:hover { filter: brightness(1.08); }
    .ctrl-row button:disabled { background: #a0aec0; cursor: not-allowed; }
    .toggle { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; margin-bottom: 8px; cursor: pointer; }
    .log { font-size: 0.8rem; line-height: 1.5; max-height: 180px; overflow-y: auto; color: #4a5568; }
    .log div { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    .canvas-wrap { background: #dbe4ec; border-radius: 12px; padding: 10px; position: relative; }
    #board { display: block; width: 100%; background: #c3d0dc; border-radius: 8px; cursor: pointer; }
    .hint { font-size: 0.8rem; color: #4a5568; margin-top: 6px; }
    .banner { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(20,25,40,0.94); color: #fff; padding: 26px 44px; border-radius: 14px;
      font-size: 1.5rem; font-weight: 700; text-align: center; display: none; }
    .banner small { display: block; font-size: 0.9rem; opacity: 0.85; margin-top: 10px; font-weight: 400; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>⚔️ Natac: War</h1>
        <p>Civ-style hex combat with era-based supply lines</p>
      </div>
      <a href="./index.html">← Settlement mode</a>
    </div>

    <!-- SETUP -->
    <div id="setup" class="setup">
      <h2>Choose your era of warfare</h2>
      <div class="era-options" id="eraOptions"></div>

      <h2>Battlefield</h2>
      <div class="setup-row">
        <div class="setup-field">
          <label>Your name</label>
          <input type="text" id="playerName" value="Commander" />
        </div>
        <div class="setup-field">
          <label>AI opponents (1–3)</label>
          <input type="number" id="aiCount" min="1" max="3" value="1" />
        </div>
        <div class="setup-field">
          <label>Map size (4–8)</label>
          <input type="number" id="mapRadius" min="4" max="8" value="6" />
        </div>
      </div>

      <button class="btn" id="startBtn">Deploy to the Front</button>
    </div>

    <!-- GAME -->
    <div id="game" class="game">
      <div class="game-layout">
        <div class="sidebar">
          <div class="panel">
            <div class="turn-line" id="turnLine">-</div>
          </div>
          <div class="panel">
            <h3>Stockpile &amp; supply</h3>
            <div class="res-hud" id="resHud"></div>
            <div class="hint" id="eraHint"></div>
          </div>
          <div class="panel">
            <div class="ctrl-row">
              <button id="endTurnBtn">End Turn</button>
              <button id="fortifyBtn" class="secondary" disabled>Fortify</button>
            </div>
            <label class="toggle"><input type="checkbox" id="supplyToggle"> Show supply range overlay</label>
          </div>
          <div class="panel" id="selPanel" style="display:none;">
            <h3 id="selTitle">Unit</h3>
            <div class="unit-stats" id="selStats"></div>
          </div>
          <div class="panel">
            <h3>Recruit (production)</h3>
            <div class="recruit-list" id="recruitList"></div>
          </div>
          <div class="panel">
            <h3>Dispatches</h3>
            <div class="log" id="log"></div>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="board" width="1080" height="760"></canvas>
          <div class="banner" id="banner"></div>
          <div class="hint" id="clickHint">Click one of your units to select it. Highlighted tiles = moves, red rings = attack targets.</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as E from './src/combat/engine.js';

    // ---- setup state ----
    let selectedEra = 'classical';
    let state = null;

    const eraOptions = document.getElementById('eraOptions');
    Object.values(E.ERAS).sort((a, b) => a.order - b.order).forEach(era => {
      const card = document.createElement('div');
      card.className = 'era-card' + (era.id === selectedEra ? ' selected' : '');
      card.dataset.era = era.id;
      const needs = [];
      if (era.usesFood) needs.push('<span class="badge food">FOOD</span>');
      if (era.usesAmmo) needs.push('<span class="badge ammo">AMMO</span>');
      if (era.usesFuel) needs.push('<span class="badge fuel">FUEL</span>');
      card.innerHTML = `<h3>${era.name}</h3><p>${era.blurb}</p>
        <div class="needs">Supplies: ${needs.join(' ')}${era.hasAir ? ' &nbsp;✈ air units' : ''}</div>`;
      card.onclick = () => {
        document.querySelectorAll('.era-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedEra = era.id;
      };
      eraOptions.appendChild(card);
    });

    document.getElementById('startBtn').onclick = () => {
      const name = document.getElementById('playerName').value.trim() || 'Commander';
      const aiCount = Math.max(1, Math.min(3, parseInt(document.getElementById('aiCount').value) || 1));
      const radius = Math.max(4, Math.min(8, parseInt(document.getElementById('mapRadius').value) || 6));
      const aiNames = ['Redland', 'Greenland', 'Purpleland'];
      const playerNames = [name, ...aiNames.slice(0, aiCount)];
      const aiPlayers = playerNames.map((_, i) => i).filter(i => i > 0);
      state = E.createCombatGame({ era: selectedEra, playerNames, aiPlayers, radius, seed: Date.now() });
      document.getElementById('setup').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      initBoard();
      render();
      refreshSidebar();
    };

    // ---- board geometry ----
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const HEX = 34;
    let view = { scale: 1, ox: 0, oy: 0, bounds: null };
    let selectedUnitId = null;
    let placeType = null;          // recruiting placement mode
    let reachCache = null, attackCache = null, rebaseCache = null, placeCache = null;
    let showSupply = false;

    function tilePixel(tile) { return E.hexToPixel(tile.q, tile.r, HEX); }

    function initBoard() {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const t of state.tiles.values()) {
        const [x, y] = tilePixel(t);
        minX = Math.min(minX, x - HEX); minY = Math.min(minY, y - HEX);
        maxX = Math.max(maxX, x + HEX); maxY = Math.max(maxY, y + HEX);
      }
      const w = maxX - minX, h = maxY - minY;
      const scale = Math.min(canvas.width / w, canvas.height / h) * 0.98;
      view.scale = scale;
      view.ox = canvas.width / 2 - (minX + w / 2) * scale;
      view.oy = canvas.height / 2 - (minY + h / 2) * scale;
      view.bounds = { minX, minY, w, h };
    }

    function worldToScreen(x, y) { return [x * view.scale + view.ox, y * view.scale + view.oy]; }
    function screenToWorld(sx, sy) { return [(sx - view.ox) / view.scale, (sy - view.oy) / view.scale]; }

    function tileAtScreen(sx, sy) {
      const [wx, wy] = screenToWorld(sx, sy);
      let best = null, bestD = Infinity;
      for (const t of state.tiles.values()) {
        const [cx, cy] = tilePixel(t);
        const d = Math.hypot(wx - cx, wy - cy);
        if (d < bestD) { bestD = d; best = t; }
      }
      return bestD <= HEX ? best : null;
    }

    // ---- selection helpers ----
    const RES_STYLE = {
      production: { dot: '#805ad5', label: 'Prod' },
      food: { dot: '#38a169', label: 'Food' },
      ammo: { dot: '#c53030', label: 'Ammo' },
      fuel: { dot: '#d69e2e', label: 'Fuel' }
    };

    function currentPlayer() { return state.players[state.currentPlayerIdx]; }
    function isHumanTurn() { return !currentPlayer().isAI && !state.winner; }

    function selectUnit(unit) {
      selectedUnitId = unit ? unit.id : null;
      placeType = null;
      recomputeSelectionCaches();
      refreshSidebar();
      render();
    }

    function recomputeSelectionCaches() {
      reachCache = attackCache = rebaseCache = placeCache = null;
      if (placeType) {
        placeCache = new Set(E.recruitTiles(state, currentPlayer().id, placeType));
        return;
      }
      const unit = selectedUnitId && E.unitById(state, selectedUnitId);
      if (!unit) return;
      if (unit.domain !== 'air') reachCache = E.reachableTiles(state, unit);
      attackCache = new Map(E.attackableTargets(state, unit).map(t => [t.tileKey, t]));
      if (unit.domain === 'air') rebaseCache = new Set(E.rebaseTargets(state, unit));
    }

    // ---- rendering ----
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const supplyMap = showSupply
        ? E.supplyDistanceMap(state, currentPlayer().id, 'land')
        : null;

      // tiles
      for (const t of state.tiles.values()) {
        const [cx, cy] = worldToScreen(...tilePixel(t));
        const pts = E.hexCornerPoints(cx, cy, HEX * view.scale);
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i = 1; i < 6; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.closePath();
        ctx.fillStyle = E.TERRAIN[t.terrain].color;
        ctx.fill();

        if (supplyMap && supplyMap.has(t.key)) {
          const d = supplyMap.get(t.key);
          const inRange = d <= state.eraConfig.maxSupplyRange;
          ctx.fillStyle = inRange ? `rgba(56,161,105,${0.36 - d * 0.03})` : 'rgba(197,48,48,0.12)';
          ctx.fill();
        }

        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(0,0,0,0.28)';
        ctx.stroke();
      }

      // movement / attack / placement highlights
      const S = HEX * view.scale;
      if (placeCache) {
        for (const k of placeCache) drawTileOverlay(k, 'rgba(43,108,176,0.35)', '#2b6cb0');
      }
      if (reachCache) {
        for (const k of reachCache.keys()) drawTileOverlay(k, 'rgba(255,255,255,0.30)', 'rgba(43,108,176,0.9)');
      }
      if (rebaseCache) {
        for (const k of rebaseCache) drawTileOverlay(k, 'rgba(128,90,213,0.30)', '#805ad5');
      }
      if (attackCache) {
        for (const k of attackCache.keys()) drawTileRing(k, '#e53e3e');
      }
      // highlight selected unit's tile
      const selUnit = selectedUnitId && E.unitById(state, selectedUnitId);
      if (selUnit) drawTileRing(selUnit.domain === 'air' ? selUnit.baseKey : E.tileKey(selUnit.q, selUnit.r), '#f6e05e', 4);

      // cities
      for (const t of state.tiles.values()) {
        if (!t.city) continue;
        drawCity(t);
      }

      // field units (land/sea)
      for (const u of state.units) {
        if (u.domain === 'air') continue;
        drawUnit(u, 0, 0);
      }
      // air units, stacked around their base
      const airByBase = {};
      for (const u of state.units) {
        if (u.domain !== 'air') continue;
        (airByBase[u.baseKey] = airByBase[u.baseKey] || []).push(u);
      }
      for (const [baseKey, list] of Object.entries(airByBase)) {
        list.forEach((u, i) => {
          const ang = (Math.PI * 2 * i) / Math.max(1, list.length) - Math.PI / 2;
          drawUnit(u, Math.cos(ang) * HEX * 0.55, Math.sin(ang) * HEX * 0.55 - HEX * 0.2);
        });
      }
    }

    function drawTileOverlay(key, fill, stroke) {
      const t = state.tiles.get(key); if (!t) return;
      const [cx, cy] = worldToScreen(...tilePixel(t));
      const pts = E.hexCornerPoints(cx, cy, HEX * view.scale * 0.92);
      ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < 6; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.fillStyle = fill; ctx.fill();
      ctx.lineWidth = 2; ctx.strokeStyle = stroke; ctx.stroke();
    }

    function drawTileRing(key, color, width = 3) {
      const t = state.tiles.get(key); if (!t) return;
      const [cx, cy] = worldToScreen(...tilePixel(t));
      const pts = E.hexCornerPoints(cx, cy, HEX * view.scale * 0.96);
      ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < 6; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.lineWidth = width; ctx.strokeStyle = color; ctx.stroke();
    }

    function drawCity(t) {
      const [cx, cy] = worldToScreen(...tilePixel(t));
      const owner = t.city.owner ? E.playerById(state, t.city.owner) : null;
      const color = owner ? owner.color : '#4a5568';
      const r = HEX * view.scale * 0.42;
      ctx.save();
      ctx.translate(cx, cy);
      // marker: star for capital, square for city
      ctx.fillStyle = color; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
      if (t.city.isCapital) {
        star(0, 0, 5, r, r * 0.45); ctx.fill(); ctx.stroke();
      } else {
        ctx.fillRect(-r * 0.8, -r * 0.8, r * 1.6, r * 1.6);
        ctx.strokeRect(-r * 0.8, -r * 0.8, r * 1.6, r * 1.6);
      }
      // city HP bar
      const bw = HEX * view.scale * 1.1, bh = 4;
      ctx.fillStyle = '#00000055'; ctx.fillRect(-bw / 2, r + 3, bw, bh);
      ctx.fillStyle = '#e2e8f0'; ctx.fillRect(-bw / 2, r + 3, bw * (t.city.hp / t.city.maxHp), bh);
      ctx.restore();
    }

    function star(cx, cy, spikes, outer, inner) {
      let rot = -Math.PI / 2, step = Math.PI / spikes;
      ctx.beginPath(); ctx.moveTo(cx, cy - outer);
      for (let i = 0; i < spikes; i++) {
        ctx.lineTo(cx + Math.cos(rot) * outer, cy + Math.sin(rot) * outer); rot += step;
        ctx.lineTo(cx + Math.cos(rot) * inner, cy + Math.sin(rot) * inner); rot += step;
      }
      ctx.closePath();
    }

    function drawUnit(u, dx, dy) {
      const tile = u.domain === 'air' ? state.tiles.get(u.baseKey) : state.tiles.get(E.tileKey(u.q, u.r));
      if (!tile) return;
      const [bx, by] = worldToScreen(...tilePixel(tile));
      const cx = bx + dx * view.scale, cy = by + dy * view.scale;
      const owner = E.playerById(state, u.owner);
      const r = HEX * view.scale * 0.34;
      const type = E.UNIT_TYPES[u.type];
      ctx.save();
      ctx.translate(cx, cy);
      // domain shape: land=circle, sea=diamond, air=triangle
      ctx.fillStyle = owner.color;
      ctx.strokeStyle = (u.id === selectedUnitId) ? '#f6e05e' : '#ffffff';
      ctx.lineWidth = (u.id === selectedUnitId) ? 3 : 2;
      ctx.beginPath();
      if (u.domain === 'sea') {
        ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath();
      } else if (u.domain === 'air') {
        ctx.moveTo(0, -r); ctx.lineTo(r * 0.9, r * 0.8); ctx.lineTo(-r * 0.9, r * 0.8); ctx.closePath();
      } else {
        ctx.arc(0, 0, r, 0, Math.PI * 2);
      }
      ctx.fill(); ctx.stroke();

      // unit symbol
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.round(r * 1.0)}px 'Noto Color Emoji', Arial`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(type.symbol, 0, 0);

      // HP bar
      const bw = r * 2.2, bh = 3;
      ctx.fillStyle = '#00000066'; ctx.fillRect(-bw / 2, r + 2, bw, bh);
      const hpc = u.hp > 60 ? '#48bb78' : u.hp > 30 ? '#ecc94b' : '#f56565';
      ctx.fillStyle = hpc; ctx.fillRect(-bw / 2, r + 2, bw * (u.hp / E.MAX_HP), bh);

      // supply indicator
      const supplied = u.supply.inSupply;
      ctx.fillStyle = supplied ? '#38a169' : '#c53030';
      ctx.beginPath(); ctx.arc(r * 0.85, -r * 0.85, r * 0.32, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = `bold ${Math.round(r * 0.5)}px Arial`;
      ctx.fillText(supplied ? '✓' : '×', r * 0.85, -r * 0.82);
      ctx.restore();
    }

    // ---- interaction ----
    canvas.addEventListener('click', (ev) => {
      if (!state || state.winner) return;
      const rect = canvas.getBoundingClientRect();
      const sx = (ev.clientX - rect.left) * (canvas.width / rect.width);
      const sy = (ev.clientY - rect.top) * (canvas.height / rect.height);
      const tile = tileAtScreen(sx, sy);
      if (!tile) return;
      handleTileClick(tile);
    });

    function handleTileClick(tile) {
      if (!isHumanTurn()) return;
      const me = currentPlayer();

      // Recruiting placement mode
      if (placeType) {
        if (placeCache && placeCache.has(tile.key)) {
          const res = E.recruit(state, me.id, placeType, tile.key);
          flash(res.ok ? `Recruited ${E.UNIT_TYPES[placeType].name}.` : res.reason);
          placeType = null;
          recomputeSelectionCaches(); refreshSidebar(); render();
        } else {
          flash('Cannot deploy there — pick a highlighted tile.');
        }
        return;
      }

      const selUnit = selectedUnitId && E.unitById(state, selectedUnitId);

      // With a unit selected, a click may be an attack / move / rebase.
      if (selUnit && selUnit.owner === me.id) {
        if (attackCache && attackCache.has(tile.key)) {
          const res = E.attack(state, selUnit.id, tile.key);
          flash(res.ok ? res.log.join(' ') : res.reason);
          afterAction();
          return;
        }
        if (selUnit.domain === 'air' && rebaseCache && rebaseCache.has(tile.key)) {
          const res = E.rebaseAir(state, selUnit.id, tile.key);
          flash(res.ok ? 'Squadron rebased.' : res.reason);
          afterAction();
          return;
        }
        if (reachCache && reachCache.has(tile.key)) {
          const res = E.moveUnit(state, selUnit.id, tile.key);
          if (!res.ok) flash(res.reason);
          recomputeSelectionCaches(); refreshSidebar(); render();
          return;
        }
      }

      // Otherwise select a friendly unit on this tile.
      const own = E.unitsAt(state, tile.q, tile.r).filter(u => u.owner === me.id);
      // also allow selecting an air unit based here
      const airHere = state.units.find(u => u.domain === 'air' && u.owner === me.id && u.baseKey === tile.key
        && u.id !== selectedUnitId);
      const pick = own.find(u => u.id !== selectedUnitId) || own[0] || airHere;
      if (pick) selectUnit(pick);
      else selectUnit(null);
    }

    function afterAction() {
      const selUnit = selectedUnitId && E.unitById(state, selectedUnitId);
      if (!selUnit || !selUnit.alive) selectedUnitId = null;
      recomputeSelectionCaches();
      refreshSidebar(); render();
      if (state.winner) endGame();
    }

    function flash(msg) {
      document.getElementById('clickHint').textContent = msg;
    }

    // ---- sidebar ----
    function refreshSidebar() {
      const me = currentPlayer();
      const era = state.eraConfig;
      document.getElementById('turnLine').innerHTML =
        `Turn ${state.turn} — <b style="color:${me.color}">${me.name}</b>${me.isAI ? ' (AI thinking…)' : ''}`;

      // resource HUD
      const hud = document.getElementById('resHud');
      hud.innerHTML = '';
      const showRes = ['production', ...(era.usesFood ? ['food'] : []), ...(era.usesAmmo ? ['ammo'] : []), ...(era.usesFuel ? ['fuel'] : [])];
      for (const key of showRes) {
        const s = RES_STYLE[key];
        const chip = document.createElement('div');
        chip.className = 'res-chip';
        chip.innerHTML = `<span class="dot" style="background:${s.dot}"></span>${s.label}: ${me.resources[key]}`;
        hud.appendChild(chip);
      }
      document.getElementById('eraHint').textContent =
        `${era.name}: supply range ${era.maxSupplyRange} hexes · +25% cost per hex of distance.`;

      // selected unit
      const selUnit = selectedUnitId && E.unitById(state, selectedUnitId);
      const selPanel = document.getElementById('selPanel');
      const fortifyBtn = document.getElementById('fortifyBtn');
      if (selUnit) {
        const t = E.UNIT_TYPES[selUnit.type];
        selPanel.style.display = 'block';
        document.getElementById('selTitle').textContent = `${t.symbol} ${t.name} (${selUnit.domain})`;
        const sup = selUnit.supply;
        const mult = sup.inSupply ? E.supplyMultiplier(selUnit).toFixed(2) : '∞';
        const consumes = [];
        if (era.usesFood) consumes.push(`food ${t.foodCost}/turn`);
        if (era.usesAmmo && t.ammoCost) consumes.push(`ammo ${t.ammoCost}/attack`);
        if (era.usesFuel && t.fuelCost) consumes.push(`fuel ${t.fuelCost}/hex`);
        document.getElementById('selStats').innerHTML = `
          <div><span class="k">Strength</span> ${t.strength}${t.rangedStrength ? ` / ranged ${t.rangedStrength} (rng ${t.range})` : ''}</div>
          <div><span class="k">HP</span> ${selUnit.hp} / ${E.MAX_HP}</div>
          <div><span class="k">${selUnit.domain === 'air' ? 'Sorties' : 'Moves left'}</span> ${selUnit.domain === 'air' ? (selUnit.hasAttacked ? '0' : '1') : selUnit.movesLeft}</div>
          <div><span class="k">Supply</span> ${sup.inSupply
            ? `<span class="supply-ok">IN SUPPLY</span> (dist ${sup.distance}, ×${mult})`
            : `<span class="supply-bad">CUT OFF</span> — attrition &amp; ½ strength`}</div>
          <div><span class="k">Consumes</span> ${consumes.join(', ') || '—'}</div>
          ${selUnit.starving ? '<div class="supply-bad">Starving! Losing HP each turn.</div>' : ''}`;
        fortifyBtn.disabled = !(isHumanTurn() && selUnit.owner === me.id && selUnit.domain !== 'air');
      } else {
        selPanel.style.display = 'none';
        fortifyBtn.disabled = true;
      }

      // recruit list
      const rl = document.getElementById('recruitList');
      rl.innerHTML = '';
      for (const type of E.recruitableTypes(state)) {
        const check = E.canRecruit(state, me.id, type.key, (E.recruitTiles(state, me.id, type.key)[0] || ''));
        const item = document.createElement('div');
        const affordable = me.resources.production >= type.prod;
        item.className = 'recruit-item' + (placeType === type.key ? ' active' : '') + (isHumanTurn() && affordable ? '' : ' disabled');
        item.innerHTML = `<span>${type.symbol} ${type.name}</span><span class="cost">${type.prod}⬢</span>`;
        item.title = `${type.domain} unit · str ${type.strength}${type.rangedStrength ? '/' + type.rangedStrength : ''}`;
        if (isHumanTurn() && affordable) {
          item.onclick = () => {
            placeType = (placeType === type.key) ? null : type.key;
            selectedUnitId = null;
            recomputeSelectionCaches();
            flash(placeType ? `Deploying ${type.name} — click a highlighted city/tile.` : 'Recruit cancelled.');
            refreshSidebar(); render();
          };
        }
        rl.appendChild(item);
      }

      // log
      const logEl = document.getElementById('log');
      logEl.innerHTML = state.log.slice(-40).reverse().map(l => `<div>${l}</div>`).join('');
    }

    // ---- controls ----
    document.getElementById('endTurnBtn').onclick = () => { if (isHumanTurn()) advanceTurn(); };
    document.getElementById('fortifyBtn').onclick = () => {
      const u = selectedUnitId && E.unitById(state, selectedUnitId);
      if (u) { E.fortifyUnit(state, u.id); recomputeSelectionCaches(); refreshSidebar(); render(); }
    };
    document.getElementById('supplyToggle').onchange = (e) => { showSupply = e.target.checked; render(); };

    function advanceTurn() {
      selectUnit(null);
      const res = E.endTurn(state);
      refreshSidebar(); render();
      if (res.winner) { endGame(); return; }
      if (currentPlayer().isAI) setTimeout(runAI, 550);
    }

    function runAI() {
      if (state.winner) { endGame(); return; }
      const me = currentPlayer();
      if (!me.isAI) { refreshSidebar(); render(); return; }
      E.runAITurn(state, me.id);
      render();
      const res = E.endTurn(state);
      refreshSidebar(); render();
      if (res.winner) { endGame(); return; }
      if (currentPlayer().isAI) setTimeout(runAI, 550);
      else { flash('Your move, commander.'); refreshSidebar(); }
    }

    // Debug/testing handle: lets the console (or an automated driver) inspect
    // the live game and resolve on-screen positions. Inert for normal play.
    window.__natacWar = {
      get state() { return state; },
      E,
      unitScreenPos(id) {
        const u = E.unitById(state, id); if (!u) return null;
        const t = u.domain === 'air' ? state.tiles.get(u.baseKey) : state.tiles.get(E.tileKey(u.q, u.r));
        const [x, y] = worldToScreen(...tilePixel(t));
        return { x, y };
      },
      tileScreenPos(key) {
        const t = state.tiles.get(key); if (!t) return null;
        const [x, y] = worldToScreen(...tilePixel(t));
        return { x, y };
      }
    };

    function endGame() {
      render();
      const winner = E.playerById(state, state.winner);
      const banner = document.getElementById('banner');
      const youWon = winner && !winner.isAI;
      banner.innerHTML = `${youWon ? '🏆 Victory!' : '💀 Defeat'}<small>${winner.name} controls the last standing capital.</small>`;
      banner.style.display = 'block';
    }
  </script>
</body>
</html>
